server:
  port: 8081

spring:
  application:
    name: quiz-orchestrator
  datasource:
    # H2 in-memory for local smoke-testing. Docker profile swaps to Postgres.
    url: jdbc:h2:mem:quizdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
  kafka:
    bootstrap-servers: localhost:9092

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/quizdb
    driver-class-name: org.postgresql.Driver
    username: quiz
    password: quiz
  kafka:
    bootstrap-servers: kafka:29092

